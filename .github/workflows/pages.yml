name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp public/index.html _site/index.html
          cp public/alta.html _site/alta.html
          cp public/consejo.html _site/consejo.html
          cp public/styles.css _site/styles.css
          cp public/app.js _site/app.js
          cp public/new-member.html _site/new-member.html
          cp public/new-member.js _site/new-member.js
          cp public/network.html _site/network.html
          cp public/teamwork.html _site/teamwork.html
          cp public/teamwork.js _site/teamwork.js
          cp data/machines.json _site/machines.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
